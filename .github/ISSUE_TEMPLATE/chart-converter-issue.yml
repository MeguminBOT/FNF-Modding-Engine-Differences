name: "Chart / Song Converter Issue"
description: Report a problem with the Chart / Song Converter tool.
labels: ["bug", "tool: chart-converter"]
body:
  - type: dropdown
    id: direction
    attributes:
      label: Conversion Direction
      options:
        - Funkin -> Psych
        - Psych -> Funkin
    validations:
      required: true
  - type: checkboxes
    id: options
    attributes:
      label: Options Used
      options:
        - label: Uploaded a separate events.json
        - label: Strip custom note types was checked
        - label: Strip events was checked
  - type: textarea
    id: input
    attributes:
      label: Input Data
      description: Paste the source chart file you used (or attach the file). If you used a separate events.json, include that too.
      render: json
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Output / Error
      description: Paste the output you received, or describe the error.
      render: json
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Result
      description: What did you expect the output to look like?
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other details (browser, screenshots, etc.).
    validations:
      required: false
