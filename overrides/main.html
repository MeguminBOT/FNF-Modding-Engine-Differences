{% extends "base.html" %}

{% block content %}
  {{ super() }}
  <style>
    .md-last-updated {
      position: absolute;
      top: 100%;
      right: 0;
      font-size: 0.55rem;
      color: var(--md-primary-bg-color--light);
      white-space: nowrap;
      opacity: 0.8;
    }
    .md-header__source {
      position: relative;
    }
  </style>
  {% if config.extra.last_updated_iso %}
  <script>
    (function() {
      var source = document.querySelector(".md-header__source");
      if (!source) return;
      var el = document.createElement("span");
      el.className = "md-last-updated";
      var iso = "{{ config.extra.last_updated_iso }}";
      var d = new Date(iso);
      if (!isNaN(d)) {
        var opts = { year: "numeric", month: "long", day: "numeric", hour: "numeric", minute: "2-digit", timeZoneName: "short" };
        el.textContent = "Last updated: " + d.toLocaleString(undefined, opts);
      } else {
        el.textContent = "Last updated: {{ config.extra.last_updated }}";
      }
      source.appendChild(el);
    })();
  </script>
  {% endif %}
{% endblock %}
